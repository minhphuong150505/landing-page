spring.application.name=landing-page-api
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/landing_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.app=INFO

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:changeme}
app.jwt.secret=${JWT_SECRET:dev-secret-please-override-at-least-32-characters-long}
app.jwt.expiration-ms=86400000
app.cors.origins=${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:80}

resend.api-key=${RESEND_API_KEY:re_9vvzWXNk_EcRjCBZ2S4ukF8NibWD9zTTU}
resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}
