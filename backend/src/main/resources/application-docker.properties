spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/landing_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:app_password}

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:changeme}
app.jwt.secret=${JWT_SECRET:dev-secret-please-override-at-least-32-characters-long}
app.jwt.expiration-ms=86400000
app.cors.origins=${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:80}
