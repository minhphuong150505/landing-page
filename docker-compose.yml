version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: landing_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: landing_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network

  api:
    build: ./backend
    container_name: landing_api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    restart: on-failure

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: landing_web
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
